{% extends 'base.html' %}

{% block title %}Add Movie{% endblock %}

{% block content %}
<div class="content">
    <h1 class="heading">Add a Movie</h1>

    <form method = "POST" action = "{{ url_for('add') }}">

    {{form.hidden_tag()}}
    {{ form.title.label }} <br> {{ form.title(size = 25, maxlength = 25) }}
    {{ form.submit }}

    </form>

</div>

{% endblock %}
